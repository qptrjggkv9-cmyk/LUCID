  .ch-theme-text { font-size:17px; font-weight:600; color:var(--off-white); line-height:1.2; }
  .ch-sub-text { font-size:12px; font-style:italic; color:var(--ink-muted); margin-top:3px; }
  .ch-check { width:20px; height:20px; border-radius:50%; border:1px solid var(--forest-light); flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-left:14px; transition:all .3s; }
  .ch-check.done { background:var(--forest-light); border-color:var(--forest-light); }
  .ch-check.done::after { content:''; width:5px; height:9px; border:1.5px solid var(--linen); border-top:none; border-left:none; transform:rotate(45deg) translateY(-1px); display:block; }

  /* DAY */
  #screen-day { background:var(--linen); color:var(--ink); flex-direction:column; }
  .day-topbar { background:var(--forest-deep); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .back-link { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:2px; color:var(--sage); background:none; border:none; cursor:pointer; transition:color .2s; padding:0; }
  .back-link:hover { color:var(--gold); }
  .topbar-brand { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:5px; color:var(--gold); }
  .progress-row { display:flex; gap:5px; align-items:center; }
  .pdot { width:6px; height:6px; border-radius:50%; background:var(--forest-mid); transition:background .3s; }
  .pdot.done { background:var(--sage); }
  .pdot.active { background:var(--gold); width:8px; height:8px; }
  .day-scroll { flex:1; overflow-y:auto; padding:28px 24px 100px; }

  .mood-section { margin-bottom:24px; }
  .section-eyebrow { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:3px; color:var(--sage); margin-bottom:10px; }
  .mood-pills { display:flex; gap:8px; flex-wrap:wrap; }
  .mood-pill { font-family:'Jost',sans-serif; font-size:11px; font-weight:400; color:var(--forest-light); background:none; border:1px solid var(--sage-pale); border-radius:30px; padding:7px 16px; cursor:pointer; transition:all .2s; }
  .mood-pill:hover { border-color:var(--sage); color:var(--forest-deep); background:var(--sage-pale); }
  .mood-pill.selected { background:var(--forest-mid); border-color:var(--forest-mid); color:var(--linen); }
  .mood-response { margin-top:12px; font-size:13px; font-style:italic; color:var(--ink-muted); line-height:1.75; min-height:24px; opacity:0; transition:opacity .4s ease; }
  .mood-response.visible { opacity:1; }

  .day-label-eyebrow { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:3px; color:var(--sage); margin-bottom:6px; margin-top:4px; }
  .day-main-title { font-size:clamp(28px,7vw,38px); font-weight:700; color:var(--forest-deep); line-height:1.1; margin-bottom:4px; }
  .day-rule { width:100%; height:1px; background:var(--sage-pale); margin:12px 0 8px; }
  .day-subtitle { font-size:14px; font-style:italic; color:var(--ink-muted); margin-bottom:16px; line-height:1.6; }
  .day-intro { font-size:14px; color:var(--ink-body); line-height:1.85; margin-bottom:8px; }

  .open-entry-section { margin:20px 0; background:var(--linen-deep); border-left:3px solid var(--gold); border-radius:0 6px 6px 0; padding:16px 18px; }
  .open-entry-label { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:3px; color:var(--gold); margin-bottom:8px; }
  .open-entry-instruction { font-size:13px; font-style:italic; color:var(--ink-muted); margin-bottom:10px; line-height:1.7; }

  .exercise-section { margin:20px 0; background:var(--sage-wash); border-left:3px solid var(--sage); border-radius:0 6px 6px 0; padding:16px 18px; }
  .exercise-label { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:3px; color:var(--forest-light); margin-bottom:8px; }
  .exercise-instruction { font-size:13px; color:var(--ink-body); line-height:1.8; white-space:pre-line; }

  .identity-section { margin:20px 0 4px; }
  .identity-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  .identity-card { background:var(--sage-wash); border-radius:0 8px 8px 0; border-left:3px solid var(--forest-light); padding:14px 14px 12px; }
  .identity-card-label { font-family:'Jost',sans-serif; font-size:8px; letter-spacing:2.5px; color:var(--forest-light); font-weight:500; margin-bottom:7px; display:block; }
  .identity-card textarea { width:100%; background:none; border:none; outline:none; font-family:'Cormorant Garamond',serif; font-size:13px; color:var(--ink); line-height:1.65; resize:none; min-height:60px; }
  .identity-card textarea::placeholder { color:var(--ink-faint); font-style:italic; }

  .prompts-section { margin-top:20px; }
  .prompt-divider { height:1px; background:var(--sage-wash); margin:16px 0 14px; }
  .prompt-label { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:2px; color:var(--forest-light); font-weight:500; margin-bottom:6px; }
  .prompt-question { font-size:14px; font-style:italic; color:var(--ink); line-height:1.75; margin-bottom:10px; }
  .write-area { width:100%; background:var(--sage-wash); border:none; border-left:3px solid var(--forest-light); border-radius:0 6px 6px 0; padding:14px 16px; font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--ink); line-height:1.8; resize:vertical; outline:none; min-height:100px; transition:background .2s, border-color .2s; }
  .write-area:focus { background:#dce6e2; border-left-color:var(--forest-deep); }
  .write-area::placeholder { color:var(--ink-faint); font-style:italic; }

  .day-bottom { position:fixed; bottom:0; left:0; right:0; background:var(--parchment); border-top:1px solid var(--sage-pale); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; z-index:10; }
  .day-counter { font-family:'Jost',sans-serif; font-size:11px; color:var(--ink-faint); letter-spacing:1px; }
  .ritual-btn { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:2px; color:var(--linen); background:var(--forest-mid); border:none; padding:11px 22px; cursor:pointer; border-radius:3px; transition:background .2s; }
  .ritual-btn:hover { background:var(--forest-light); }

  /* RITUAL */
  #screen-ritual { background:var(--forest-deep); align-items:center; justify-content:center; text-align:center; padding:48px 32px; }
  .ritual-inner { max-width:360px; width:100%; }
  .ritual-eyebrow { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:4px; color:var(--sage); margin-bottom:36px; }
  .breath-container { position:relative; width:100px; height:100px; margin:0 auto 28px; }
  .breath-ring-outer { position:absolute; inset:0; border-radius:50%; border:1px solid var(--sage); animation:breatheOuter 4s ease-in-out infinite; }
  .breath-ring-inner { position:absolute; inset:18px; border-radius:50%; border:1px solid var(--gold); opacity:0.4; animation:breatheInner 4s ease-in-out infinite; }
  @keyframes breatheOuter { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.18);opacity:1} }
  @keyframes breatheInner { 0%,100%{transform:scale(1);opacity:0.4} 50%{transform:scale(1.1);opacity:0.8} }
  .ritual-instruction { font-family:'Jost',sans-serif; font-size:12px; color:var(--ink-muted); margin-bottom:36px; line-height:1.7; letter-spacing:0.5px; }
  .reveal-affirmation-btn { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:3px; color:var(--sage); background:none; border:1px solid var(--forest-light); padding:12px 28px; cursor:pointer; border-radius:2px; transition:all .3s; margin-bottom:32px; display:block; width:100%; }
  .reveal-affirmation-btn:hover { border-color:var(--gold); color:var(--gold); }
  .ritual-affirmation { font-size:20px; font-style:italic; font-weight:600; color:var(--off-white); line-height:1.65; margin-bottom:36px; opacity:0; transform:translateY(8px); transition:opacity 1.2s ease, transform 1.2s ease; min-height:80px; }
  .ritual-affirmation.visible { opacity:1; transform:translateY(0); }
  .complete-btn { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:3px; color:var(--forest-deep); background:var(--gold); border:none; padding:14px 32px; cursor:pointer; border-radius:2px; transition:opacity .2s; width:100%; }
  .complete-btn:hover { opacity:0.88; }

  /* COMPLETION */
  #screen-completion { background:var(--forest-deep); align-items:center; justify-content:center; text-align:center; padding:64px 32px; position:relative; overflow:hidden; }
  #screen-completion::before { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.08) 0%, transparent 70%); pointer-events:none; }
  .completion-inner { max-width:400px; width:100%; position:relative; z-index:1; }
  .completion-eyebrow { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:5px; color:var(--gold); margin-bottom:40px; animation:fadeUp .8s ease both; }
  .completion-heading { font-size:clamp(32px,8vw,48px); font-weight:700; color:var(--off-white); line-height:1.1; margin-bottom:32px; white-space:pre-line; animation:fadeUp .8s .1s ease both; }
  .completion-rule { width:60px; height:1px; background:var(--gold); opacity:0.3; margin:0 auto 32px; animation:fadeUp .8s .15s ease both; }
  .completion-body { font-size:15px; color:var(--sage); line-height:1.85; margin-bottom:12px; animation:fadeUp .8s .2s ease both; }
  .completion-share-block { margin:40px 0 32px; padding:24px 20px; border:1px solid rgba(122,158,142,0.2); border-radius:4px; animation:fadeUp .8s .3s ease both; }
  .completion-share-prompt { font-size:13px; font-style:italic; color:var(--ink-muted); margin-bottom:14px; line-height:1.65; }
  .share-btn { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:3px; color:var(--sage); background:none; border:1px solid var(--forest-light); padding:11px 24px; cursor:pointer; border-radius:2px; transition:all .3s; }
  .share-btn:hover { border-color:var(--sage); color:var(--off-white); }
  .completion-next-block { margin-top:40px; animation:fadeUp .8s .4s ease both; }
  .completion-next-label { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:3px; color:var(--gold); margin-bottom:12px; }
  .completion-next-body { font-size:14px; color:var(--ink-muted); line-height:1.75; margin-bottom:20px; }
  .waitlist-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .waitlist-input { font-family:'Jost',sans-serif; font-size:12px; letter-spacing:1px; background:rgba(44,74,62,0.3); border:1px solid var(--forest-mid); color:var(--off-white); padding:12px 16px; border-radius:2px; outline:none; flex:1; min-width:200px; transition:border-color .2s; }
  .waitlist-input:focus { border-color:var(--sage); }
  .waitlist-input::placeholder { color:var(--ink-muted); }
  .waitlist-btn { font-family:'Jost',sans-serif; font-size:9px; letter-spacing:3px; color:var(--forest-deep); background:var(--gold); border:none; padding:12px 20px; cursor:pointer; border-radius:2px; transition:opacity .2s; white-space:nowrap; }
  .waitlist-btn:hover { opacity:0.88; }
  .waitlist-btn.submitted { background:var(--sage); color:var(--linen); cursor:default; opacity:1; }
  .completion-closing { margin-top:48px; font-size:17px; font-style:italic; font-weight:600; color:var(--off-white); opacity:0.5; line-height:1.6; animation:fadeUp .8s .5s ease both; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation:fadeUp .5s ease both; }

  .day-scroll::-webkit-scrollbar { width:4px; }
  .day-scroll::-webkit-scrollbar-track { background:transparent; }
  .day-scroll::-webkit-scrollbar-thumb { background:var(--sage-pale); border-radius:2px; }

  @media (max-width:480px) {
    .identity-grid { grid-template-columns:1fr; }
    .day-scroll { padding:22px 18px 100px; }
    .chapter-list { padding:0 14px 40px; }
    .waitlist-row { flex-direction:column; }
    .waitlist-input { min-width:unset; }
  }
</style>
</head>
<body>

<!-- COVER -->
<div id="screen-cover" class="screen active">
  <div class="corner-mark tl"></div><div class="corner-mark tr"></div>
  <div class="corner-mark bl"></div><div class="corner-mark br"></div>
  <div class="cover-inner" id="cover-inner"></div>
</div>

<!-- GATE -->
<div id="screen-gate" class="screen">
  <div class="corner-mark tl"></div><div class="corner-mark tr"></div>
  <div class="corner-mark bl"></div><div class="corner-mark br"></div>
  <div class="gate-inner" id="gate-inner"></div>
</div>

<!-- NAV -->
<div id="screen-nav" class="screen">
  <div class="nav-header"><div class="nav-brand">L U C I D</div></div>
  <div class="nav-title-block" id="nav-title-block"></div>
  <div class="nav-rule"></div>
  <div class="chapter-list" id="chapter-list"></div>
</div>

<!-- DAY -->
<div id="screen-day" class="screen">
  <div class="day-topbar">
    <button class="back-link" onclick="showNav()">← all days</button>
    <div class="topbar-brand">LUCID</div>
    <div class="progress-row" id="progress-row"></div>
  </div>
  <div class="day-scroll" id="day-scroll"></div>
  <div class="day-bottom">
    <div class="day-counter" id="day-counter"></div>
    <button class="ritual-btn" onclick="showRitual()">closing ritual →</button>
  </div>
</div>

<!-- RITUAL -->
<div id="screen-ritual" class="screen">
  <div class="ritual-inner">
    <div class="ritual-eyebrow">CLOSING RITUAL</div>
    <div class="breath-container">
      <div class="breath-ring-outer"></div>
      <div class="breath-ring-inner"></div>
    </div>
    <p class="ritual-instruction">
      Breathe with the ring.<br>
      Inhale as it expands.<br>
      Exhale as it returns.
    </p>
    <button class="reveal-affirmation-btn" onclick="revealAffirmation()">reveal today's affirmation</button>
    <div class="ritual-affirmation" id="ritual-affirmation"></div>
    <button class="complete-btn" onclick="completeDay()">mark complete &amp; continue →</button>
  </div>
</div>

<!-- COMPLETION -->
<div id="screen-completion" class="screen">
  <div class="completion-inner" id="completion-inner"></div>
</div>

<!-- ============================================================
     LOGIC — do not edit
     ============================================================ -->
<script>
let userName  = '';
let userEmail = '';
let currentDay = 0;
let completed  = new Array(7).fill(false);

window.addEventListener('DOMContentLoaded', () => {
  renderCover();
  renderGate();
  renderNavTitles();
});

function renderCover() {
  const c = CONTENT.cover;
  document.getElementById('cover-inner').innerHTML = `
    <div class="brand-mark">L U C I D</div>
    <div class="cover-rule"></div>
    <div class="cover-the">${c.eyebrow}</div>
    <div class="cover-title">${c.title}</div>
    <div class="cover-rule-2"></div>
    <div class="cover-sub">${c.subtitle}</div>
    <div class="cover-tag">${c.tag}</div>
    <div class="cover-quote">${c.quote.join('<br>')}</div>
    <button class="begin-btn" onclick="showScreen('screen-gate')">${c.cta}</button>
  `;
}

function renderGate() {
  const g = CONTENT.gate;
  document.getElementById('gate-inner').innerHTML = `
    <div class="gate-brand">L U C I D</div>
    <div class="gate-heading">${g.heading}</div>
    <div class="gate-sub">${g.sub}</div>
    <div class="gate-fields">
      <input class="gate-input" type="text" id="gate-name" placeholder="${g.namePlaceholder}" autocomplete="given-name">
      <div class="gate-error" id="gate-name-error">Please enter your name.</div>
      <input class="gate-input" type="email" id="gate-email" placeholder="${g.emailPlaceholder}" autocomplete="email">
      <div class="gate-error" id="gate-email-error">Please enter a valid email address.</div>
    </div>
    <button class="gate-btn" onclick="submitGate()">${g.cta}</button>
    <div class="gate-privacy">${g.privacy}</div>
  `;
}

function submitGate() {
  const nameEl   = document.getElementById('gate-name');
  const emailEl  = document.getElementById('gate-email');
  const nameErr  = document.getElementById('gate-name-error');
  const emailErr = document.getElementById('gate-email-error');
  let valid = true;

  if (!nameEl.value.trim()) {
    nameErr.classList.add('visible'); valid = false;
  } else { nameErr.classList.remove('visible'); }

  const ev = emailEl.value.trim();
  if (!ev || !ev.includes('@') || !ev.includes('.')) {
    emailErr.classList.add('visible'); valid = false;
  } else { emailErr.classList.remove('visible'); }

  if (!valid) return;

  userName  = nameEl.value.trim().split(' ')[0];
  userEmail = ev;
  subscribeToMailerLite(userEmail, userName, MAILERLITE_GROUP_ID);
  renderNavTitles();
  showNav();
}

async function subscribeToMailerLite(email, name, groupId) {
  if (!MAILERLITE_API_KEY || MAILERLITE_API_KEY === 'PASTE_YOUR_API_KEY_HERE') return;
  try {
    await fetch('https://connect.mailerlite.com/api/subscribers', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${MAILERLITE_API_KEY}`
      },
      body: JSON.stringify({
        email,
        fields: { name },
        groups: [groupId],
        status: 'active'
      })
    });
  } catch (e) { console.warn('MailerLite:', e); }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showNav() { renderNav(); showScreen('screen-nav'); }

function renderNavTitles() {
  const n = CONTENT.nav;
  const eyebrow = userName ? `${userName}'s Journey` : n.eyebrow;
  document.getElementById('nav-title-block').innerHTML = `
    <div class="nav-eyebrow">${eyebrow}</div>
    <div class="nav-heading">${n.heading}</div>
    <div class="nav-sub">${n.sub}</div>
  `;
}

function renderNav() {
  renderNavTitles();
  document.getElementById('chapter-list').innerHTML = CONTENT.days.map((d, i) => `
    <button class="chapter-btn${completed[i] ? ' completed' : ''}" onclick="openDay(${i})">
      <div class="chapter-btn-left">
        <div class="ch-day-label">DAY ${d.num}</div>
        <div class="ch-theme-text">${d.theme}</div>
        <div class="ch-sub-text">${d.sub}</div>
      </div>
      <div class="ch-check${completed[i] ? ' done' : ''}"></div>
    </button>
  `).join('');
}

function openDay(i) { currentDay = i; renderDayScreen(); showScreen('screen-day'); }

function renderDayScreen() {
  const d = CONTENT.days[currentDay];

  document.getElementById('progress-row').innerHTML = CONTENT.days.map((_, i) =>
    `<div class="pdot${i === currentDay ? ' active' : completed[i] ? ' done' : ''}"></div>`
  ).join('');
  document.getElementById('day-counter').textContent = `Day ${currentDay + 1} of 7`;

  let html = '';

  // Mood
  html += `
    <div class="mood-section fade-up">
      <div class="section-eyebrow">HOW ARE YOU ARRIVING TODAY?</div>
      <div class="mood-pills">
        ${Object.keys(CONTENT.moodIntros).map(m =>
          `<button class="mood-pill" onclick="selectMood(this,'${m}')">${m}</button>`
        ).join('')}
      </div>
      <div class="mood-response" id="mood-response"></div>
    </div>`;

  // Header
  html += `
    <div class="fade-up" style="animation-delay:.05s">
      <div class="day-label-eyebrow">DAY ${d.num}</div>
      <div class="day-main-title">${d.theme}</div>
      <div class="day-rule"></div>
      <div class="day-subtitle">${d.sub}</div>
      ${d.intro.map(p => `<p class="day-intro">${p}</p>`).join('')}
    </div>`;

  // Open entry (Day 3)
  if (d.openEntry) {
    html += `
      <div class="open-entry-section fade-up" style="animation-delay:.08s">
        <div class="open-entry-label">${d.openEntry.label}</div>
        <div class="open-entry-instruction">${d.openEntry.instruction}</div>
        <textarea class="write-area" placeholder="${d.openEntry.ph}" rows="3"></textarea>
      </div>`;
  }

  // Identity board (Day 4)
  if (d.identityBoard) {
    html += `
      <div class="identity-section fade-up" style="animation-delay:.1s">
        <div class="section-eyebrow">BUILD HER — YOUR IDENTITY BOARD</div>
        <div class="identity-grid">
          <div class="identity-card"><span class="identity-card-label">SHE THINKS</span><textarea placeholder="She doesn't wait for certainty…" rows="3"></textarea></div>
          <div class="identity-card"><span class="identity-card-label">SHE FEELS</span><textarea placeholder="Grounded even when uncertain…" rows="3"></textarea></div>
          <div class="identity-card"><span class="identity-card-label">SHE DOES</span><textarea placeholder="She acts before she's ready…" rows="3"></textarea></div>
          <div class="identity-card"><span class="identity-card-label">SHE HAS</span><textarea placeholder="The life she stopped apologising for wanting…" rows="3"></textarea></div>
        </div>
      </div>`;
  }

  // Exercise
  if (d.exercise) {
    html += `
      <div class="exercise-section fade-up" style="animation-delay:.12s">
        <div class="exercise-label">${d.exercise.label}</div>
        <div class="exercise-instruction">${d.exercise.instruction}</div>
      </div>`;
  }

  // Prompts
  html += `<div class="prompts-section fade-up" style="animation-delay:.15s">`;
  d.prompts.forEach((p, i) => {
    const ph = p.ph.replace('{name}', userName || 'you');
    html += `
      <div class="prompt-divider"></div>
      <div class="prompt-label">${p.label}</div>
      <div class="prompt-question">${p.q}</div>
      <textarea class="write-area" placeholder="${ph}" id="ans_${currentDay}_${i}" rows="4"></textarea>`;
  });
  html += `</div>`;

  document.getElementById('day-scroll').innerHTML = html;
}

function selectMood(btn, mood) {
  btn.closest('.mood-pills').querySelectorAll('.mood-pill').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const el = document.getElementById('mood-response');
  let text = (CONTENT.moodIntros[mood] || '').replace('{name}', userName || 'You');
  el.textContent = text;
  el.classList.remove('visible');
  requestAnimationFrame(() => el.classList.add('visible'));
}

function showRitual() {
  const aff = document.getElementById('ritual-affirmation');
  aff.textContent = `"${CONTENT.days[currentDay].affirmation}"`;
  aff.classList.remove('visible');
  showScreen('screen-ritual');
}

function revealAffirmation() {
  document.getElementById('ritual-affirmation').classList.add('visible');
}

function completeDay() {
  completed[currentDay] = true;
  if (currentDay < 6) { currentDay++; openDay(currentDay); }
  else { renderCompletion(); showScreen('screen-completion'); }
}

function renderCompletion() {
  const c = CONTENT.completion;
  const heading = userName
    ? `${userName},\nseven days ago\nyou showed up\nfor yourself.`
    : c.heading;
  document.getElementById('completion-inner').innerHTML = `
    <div class="completion-eyebrow">${c.eyebrow}</div>
    <div class="completion-heading">${heading}</div>
    <div class="completion-rule"></div>
    ${c.body.map(p => `<p class="completion-body">${p}</p>`).join('')}
    <div class="completion-share-block">
      <div class="completion-share-prompt">${c.sharePrompt}</div>
      <button class="share-btn" id="share-btn" onclick="shareProduct()">send it to someone →</button>
    </div>
    <div class="completion-next-block">
      <div class="completion-next-label">${c.nextLabel}</div>
      <div class="completion-next-body">${c.nextBody}</div>
      <div class="waitlist-row">
        <input class="waitlist-input" type="email" id="waitlist-email" placeholder="${c.waitlistPlaceholder}" value="${userEmail}">
        <button class="waitlist-btn" id="waitlist-btn" onclick="joinWaitlist()">${c.waitlistCta}</button>
      </div>
    </div>
    <div class="completion-closing">${c.closingLine}</div>
  `;
}

function shareProduct() {
  const text = CONTENT.completion.shareText;
  const btn  = document.getElementById('share-btn');
  if (navigator.share) { navigator.share({ text }).catch(() => fallbackCopy(text, btn)); return; }
  fallbackCopy(text, btn);
}

function fallbackCopy(text, btn) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'copied to clipboard ✓';
      btn.style.color = 'var(--gold)';
      btn.style.borderColor = 'var(--gold)';
    }).catch(() => manualCopy(text, btn));
    return;
  }
  manualCopy(text, btn);
}

function manualCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = 'copied to clipboard ✓';
    btn.style.color = 'var(--gold)';
  } catch { btn.textContent = 'tap to copy'; btn.onclick = () => prompt('Copy this:', text); }
  document.body.removeChild(ta);
}

function joinWaitlist() {
  const el = document.getElementById('waitlist-email');
  const v  = el.value.trim();
  if (!v || !v.includes('@') || !v.includes('.')) {
    el.style.borderColor = 'var(--gold)'; el.placeholder = 'please enter a valid email'; return;
  }
  subscribeToMailerLite(v, userName, MAILERLITE_GROUP_ID);
  const btn = document.getElementById('waitlist-btn');
  btn.textContent = "YOU'RE IN ✓";
  btn.classList.add('submitted');
  el.disabled = true;
}
</script>
</body>
